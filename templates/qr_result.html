<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceHire — Job Update</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      font-family: 'Inter', sans-serif
    }
  </style>
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="bg-white rounded-3xl shadow-xl p-8 max-w-sm w-full text-center">
    {% if success %}
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg class="w-10 h-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h1 class="text-2xl font-black text-green-700 mb-2">Done! ✓</h1>
    {% else %}
    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </div>
    <h1 class="text-2xl font-black text-red-600 mb-2">Error</h1>
    {% endif %}
    <p class="text-slate-600 text-base mb-6">{{ message }}</p>
    <a href="/dashboard/worker" class="block w-full bg-black text-white font-bold py-3 rounded-2xl hover:opacity-90">
      Go to Dashboard
    </a>
  </div>
</body>

</html>

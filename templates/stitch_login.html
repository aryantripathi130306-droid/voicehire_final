<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - VoiceHire</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-container": "#40c2fd",
                        "on-secondary-container": "#004d6a",
                        "on-primary-fixed": "#131b2e",
                        "surface-tint": "#565e74",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#76777d",
                        "on-tertiary-fixed": "#40000d",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "surface": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eceef0",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#7bd0ff",
                        "secondary": "#00668a",
                        "primary-fixed": "#dae2fd",
                        "on-background": "#191c1e",
                        "primary": "#000000",
                        "on-secondary-fixed": "#001e2c",
                        "surface-container-high": "#e6e8ea",
                        "outline-variant": "#c6c6cd",
                        "inverse-primary": "#bec6e0",
                        "surface-variant": "#e0e3e5",
                        "tertiary-container": "#40000d",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-tertiary-container": "#f23d5c",
                        "primary-fixed-dim": "#bec6e0",
                        "secondary-fixed": "#c4e7ff",
                        "on-tertiary-fixed-variant": "#92002a",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed": "#ffdadb",
                        "tertiary": "#000000",
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary-fixed-variant": "#004c69",
                        "inverse-surface": "#2d3133",
                        "on-surface-variant": "#45464d",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-secondary": "#ffffff",
                        "primary-container": "#131b2e",
                        "surface-bright": "#f7f9fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "stack-md": "24px",
                        "touch-target-min": "56px",
                        "stack-lg": "48px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "body-md": ["Inter"],
                        "action-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-bold": ["16px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "500" }],
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "action-lg": ["20px", { "lineHeight": "1.2", "letterSpacing": "0", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
    <!-- Ambient Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary/10 blur-[100px] z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary/5 blur-[120px] z-0"></div>
    <!-- Main Content Canvas (Navigation suppressed for transactional screen) -->
    <main class="w-full max-w-md relative z-10 flex flex-col gap-stack-lg">
        <!-- Header Section -->
        <header class="flex flex-col items-center text-center gap-stack-sm">
            <div class="w-32 h-16 bg-primary rounded-xl flex items-center justify-center mb-base shadow-sm">
                <span class="material-symbols-outlined text-on-primary text-[32px] font-bold"
                    style="font-variation-settings: 'FILL' 1;">mic</span>
            </div>
            <h1 class="font-headline-xl text-headline-xl text-primary">VoiceHire</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Log in to access your dashboard.</p>
        </header>
        <!-- Login Form Glass Card -->
        <form class="glass-panel rounded-xl p-6 md:p-8 flex flex-col gap-stack-md w-full relative">
            <!-- Email Input Group -->
            <div class="flex flex-col gap-base relative">
                <label class="font-label-bold text-label-bold text-on-surface" for="email">Email Address</label>
                <div class="relative flex items-center">
                    <input
                        class="w-full h-touch-target-min bg-surface-container-low border-0 border-b-2 border-outline rounded-t-lg px-4 pt-2 pb-2 font-body-md text-body-md text-on-surface focus:ring-0 focus:border-primary transition-colors pr-14"
                        id="email" name="email" placeholder="you@example.com" required="" type="email" />
                    <button aria-label="Use voice input for email"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                </div>
            </div>
            <!-- Password Input Group -->
            <div class="flex flex-col gap-base relative">
                <div class="flex justify-between items-end w-full">
                    <label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
                    <a class="font-body-md text-body-md text-secondary hover:text-primary transition-colors text-sm font-semibold"
                        href="#">Forgot Password?</a>
                </div>
                <div class="relative flex items-center">
                    <input
                        class="w-full h-touch-target-min bg-surface-container-low border-0 border-b-2 border-outline rounded-t-lg px-4 pt-2 pb-2 font-body-md text-body-md text-on-surface focus:ring-0 focus:border-primary transition-colors pr-14"
                        id="password" name="password" placeholder="••••••••" required="" type="password" />
                    <button aria-label="Use voice input for password"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none"
                        type="button">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                </div>
            </div>
            <!-- Primary Action -->
            <button
                class="w-full h-touch-target-min bg-primary text-on-primary rounded-lg font-action-lg text-action-lg flex items-center justify-center gap-2 hover:bg-inverse-surface transition-colors mt-base shadow-sm"
                type="submit">
                <span>Log In</span>
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
            </button>
        </form>
        <!-- Footer Links -->
        <footer class="flex justify-center items-center text-center">
            <p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account?
                <a class="font-label-bold text-label-bold text-secondary hover:text-primary transition-colors ml-1"
                    href="#">Create an Account</a>
            </p>
        </footer>
    </main>
</body>

</html>

<!DOCTYPE html>

<html class="light" lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Customer Dashboard</title>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
                tailwind.config = {
                        darkMode: "class",
                        theme: {
                                extend: {
                                        "colors": {
                                                "primary": "#000000",
                                                "surface-container": "#eceef0",
                                                "secondary-container": "#40c2fd",
                                                "tertiary-fixed-dim": "#ffb2b7",
                                                "inverse-surface": "#2d3133",
                                                "surface-container-lowest": "#ffffff",
                                                "surface-bright": "#f7f9fb",
                                                "on-secondary-fixed": "#001e2c",
                                                "surface": "#f7f9fb",
                                                "error-container": "#ffdad6",
                                                "on-primary": "#ffffff",
                                                "surface-dim": "#d8dadc",
                                                "surface-container-highest": "#e0e3e5",
                                                "tertiary-container": "#40000d",
                                                "on-surface": "#191c1e",
                                                "surface-container-high": "#e6e8ea",
                                                "on-surface-variant": "#45464d",
                                                "inverse-primary": "#bec6e0",
                                                "background": "#f7f9fb",
                                                "primary-fixed-dim": "#bec6e0",
                                                "on-tertiary-container": "#f23d5c",
                                                "tertiary-fixed": "#ffdadb",
                                                "on-error": "#ffffff",
                                                "tertiary": "#000000",
                                                "on-secondary-fixed-variant": "#004c69",
                                                "on-error-container": "#93000a",
                                                "outline-variant": "#c6c6cd",
                                                "on-tertiary": "#ffffff",
                                                "on-primary-fixed": "#131b2e",
                                                "primary-container": "#131b2e",
                                                "inverse-on-surface": "#eff1f3",
                                                "surface-variant": "#e0e3e5",
                                                "error": "#ba1a1a",
                                                "surface-container-low": "#f2f4f6",
                                                "secondary-fixed-dim": "#7bd0ff",
                                                "on-background": "#191c1e",
                                                "outline": "#76777d",
                                                "on-secondary": "#ffffff",
                                                "primary-fixed": "#dae2fd",
                                                "on-tertiary-fixed-variant": "#92002a",
                                                "secondary-fixed": "#c4e7ff",
                                                "on-primary-container": "#7c839b",
                                                "on-tertiary-fixed": "#40000d",
                                                "secondary": "#00668a",
                                                "surface-tint": "#565e74",
                                                "on-secondary-container": "#004d6a",
                                                "on-primary-fixed-variant": "#3f465c"
                                        },
                                        "borderRadius": {
                                                "DEFAULT": "0.25rem",
                                                "lg": "0.5rem",
                                                "xl": "0.75rem",
                                                "full": "9999px"
                                        },
                                        "spacing": {
                                                "stack-sm": "12px",
                                                "margin-desktop": "64px",
                                                "gutter": "24px",
                                                "margin-mobile": "16px",
                                                "touch-target-min": "56px",
                                                "stack-lg": "48px",
                                                "base": "8px",
                                                "stack-md": "24px"
                                        },
                                        "fontFamily": {
                                                "headline-xl": [
                                                        "Inter"
                                                ],
                                                "label-bold": [
                                                        "Inter"
                                                ],
                                                "body-md": [
                                                        "Inter"
                                                ],
                                                "body-lg": [
                                                        "Inter"
                                                ],
                                                "headline-md": [
                                                        "Inter"
                                                ],
                                                "action-lg": [
                                                        "Inter"
                                                ]
                                        },
                                        "fontSize": {
                                                "headline-xl": [
                                                        "40px",
                                                        {
                                                                "lineHeight": "1.2",
                                                                "letterSpacing": "-0.02em",
                                                                "fontWeight": "800"
                                                        }
                                                ],
                                                "label-bold": [
                                                        "16px",
                                                        {
                                                                "lineHeight": "1.4",
                                                                "letterSpacing": "0.05em",
                                                                "fontWeight": "700"
                                                        }
                                                ],
                                                "body-md": [
                                                        "18px",
                                                        {
                                                                "lineHeight": "1.6",
                                                                "letterSpacing": "0",
                                                                "fontWeight": "400"
                                                        }
                                                ],
                                                "body-lg": [
                                                        "20px",
                                                        {
                                                                "lineHeight": "1.6",
                                                                "letterSpacing": "0",
                                                                "fontWeight": "500"
                                                        }
                                                ],
                                                "headline-md": [
                                                        "24px",
                                                        {
                                                                "lineHeight": "1.3",
                                                                "letterSpacing": "-0.01em",
                                                                "fontWeight": "700"
                                                        }
                                                ],
                                                "action-lg": [
                                                        "20px",
                                                        {
                                                                "lineHeight": "1.2",
                                                                "letterSpacing": "0",
                                                                "fontWeight": "600"
                                                        }
                                                ]
                                        }
                                },
                        },
                }
        </script>
        <style>
                body {
                        font-family: 'Inter', sans-serif;
                }

                .material-symbols-outlined {
                        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
                }
        </style>
        <style>
                body {
                        min-height: max(884px, 100dvh);
                }
        </style>
</head>

<body class="bg-background text-on-background min-h-screen relative">
        <!-- TopAppBar from JSON -->
        <header
                class="sticky top-0 w-full z-50 border-b-[1.5px] border-slate-200 dark:border-slate-800 bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-2xl shadow-sm dark:shadow-none">
                <div class="flex items-center justify-between px-6 h-20 w-full">
                        <button
                                class="text-slate-900 dark:text-slate-50 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined">menu</span>
                        </button>
                        <h1 class="font-sans font-bold tracking-tight text-lg text-slate-900 dark:text-slate-50">
                                Reliable Guide</h1>
                        <button
                                class="text-slate-900 dark:text-slate-50 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined">translate</span>
                        </button>
                </div>
        </header>
        <!-- Main Canvas -->
        <main
                class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg flex flex-col gap-stack-lg pb-32">
                <!-- Voice Search Section -->
                <section class="flex flex-col items-center justify-center gap-stack-md pt-stack-sm">
                        <div class="text-center space-y-base">
                                <h2 class="font-headline-xl text-headline-xl text-on-surface">How can we help?</h2>
                                <p class="font-body-lg text-body-lg text-on-surface-variant">Tap the microphone and tell
                                        us what you need.</p>
                        </div>
                        <!-- Voice Button with Premium Indicator Design -->
                        <div class="relative w-full max-w-sm flex justify-center group cursor-pointer mt-base">
                                <div
                                        class="absolute inset-0 bg-secondary-fixed/50 blur-xl rounded-full scale-105 group-hover:scale-110 transition-transform duration-500">
                                </div>
                                <button
                                        class="relative bg-primary text-on-primary h-[80px] w-full rounded-full flex items-center justify-center gap-base shadow-lg active:scale-95 transition-all duration-200 border-[1.5px] border-primary/10">
                                        <span class="material-symbols-outlined text-[32px]"
                                                style="font-variation-settings: 'FILL' 1;">mic</span>
                                        <span class="font-action-lg text-action-lg">Voice Search</span>
                                        <!-- Decorative waveform suggestion -->
                                        <div class="absolute right-8 flex items-center gap-1 h-6 opacity-60">
                                                <div
                                                        class="w-1.5 h-full bg-secondary-container rounded-full animate-pulse">
                                                </div>
                                                <div
                                                        class="w-1.5 h-4 bg-secondary-container rounded-full animate-pulse delay-75">
                                                </div>
                                                <div
                                                        class="w-1.5 h-5 bg-secondary-container rounded-full animate-pulse delay-150">
                                                </div>
                                        </div>
                                </button>
                        </div>
                </section>
                <!-- Service Categories Grid -->
                <section class="flex flex-col gap-stack-md">
                        <h3 class="font-headline-md text-headline-md text-on-surface">Select a Service</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-gutter">
                                <!-- Cleaning Card -->
                                <button
                                        class="flex flex-col items-center justify-center p-stack-md gap-stack-sm rounded-xl bg-surface-container-lowest/80 backdrop-blur-[24px] border-[1.5px] border-outline-variant shadow-sm hover:bg-surface-container-low transition-colors active:scale-95 duration-200 min-h-[140px]">
                                        <div
                                                class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
                                                <span class="material-symbols-outlined text-[32px]"
                                                        style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
                                        </div>
                                        <span class="font-label-bold text-label-bold text-on-surface">Cleaning</span>
                                </button>
                                <!-- Repairs Card -->
                                <button
                                        class="flex flex-col items-center justify-center p-stack-md gap-stack-sm rounded-xl bg-surface-container-lowest/80 backdrop-blur-[24px] border-[1.5px] border-outline-variant shadow-sm hover:bg-surface-container-low transition-colors active:scale-95 duration-200 min-h-[140px]">
                                        <div
                                                class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
                                                <span class="material-symbols-outlined text-[32px]"
                                                        style="font-variation-settings: 'FILL' 1;">build</span>
                                        </div>
                                        <span class="font-label-bold text-label-bold text-on-surface">Repairs</span>
                                </button>
                                <!-- Errands Card -->
                                <button
                                        class="flex flex-col items-center justify-center p-stack-md gap-stack-sm rounded-xl bg-surface-container-lowest/80 backdrop-blur-[24px] border-[1.5px] border-outline-variant shadow-sm hover:bg-surface-container-low transition-colors active:scale-95 duration-200 min-h-[140px]">
                                        <div
                                                class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
                                                <span class="material-symbols-outlined text-[32px]"
                                                        style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
                                        </div>
                                        <span class="font-label-bold text-label-bold text-on-surface">Errands</span>
                                </button>
                                <!-- Garden Card -->
                                <button
                                        class="flex flex-col items-center justify-center p-stack-md gap-stack-sm rounded-xl bg-surface-container-lowest/80 backdrop-blur-[24px] border-[1.5px] border-outline-variant shadow-sm hover:bg-surface-container-low transition-colors active:scale-95 duration-200 min-h-[140px]">
                                        <div
                                                class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
                                                <span class="material-symbols-outlined text-[32px]"
                                                        style="font-variation-settings: 'FILL' 1;">yard</span>
                                        </div>
                                        <span class="font-label-bold text-label-bold text-on-surface">Garden</span>
                                </button>
                                <!-- Personal Care Card -->
                                <button
                                        class="flex flex-col items-center justify-center p-stack-md gap-stack-sm rounded-xl bg-surface-container-lowest/80 backdrop-blur-[24px] border-[1.5px] border-outline-variant shadow-sm hover:bg-surface-container-low transition-colors active:scale-95 duration-200 min-h-[140px]">
                                        <div
                                                class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
                                                <span class="material-symbols-outlined text-[32px]"
                                                        style="font-variation-settings: 'FILL' 1;">self_improvement</span>
                                        </div>
                                        <span class="font-label-bold text-label-bold text-on-surface">Personal
                                                Care</span>
                                </button>
                        </div>
                </section>
        </main>
        <!-- BottomNavBar from JSON - Active on Home -->
        <nav
                class="fixed bottom-0 w-full z-50 border-t-[1.5px] border-slate-200 dark:border-slate-800 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-10px_40px_-15px_rgba(15,23,42,0.1)] block md:hidden">
                <div class="flex justify-around items-center px-4 py-4 pb-8 w-full">
                        <!-- Active Item: Home -->
                        <button
                                class="flex flex-col items-center justify-center bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-2xl px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-150 group">
                                <span class="material-symbols-outlined mb-1"
                                        style="font-variation-settings: 'FILL' 1;">home_app_logo</span>
                                <span class="text-[12px] font-bold uppercase tracking-widest">Home</span>
                        </button>
                        <!-- Inactive Item: Tasks -->
                        <button
                                class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-150 group">
                                <span class="material-symbols-outlined mb-1">work</span>
                                <span class="text-[12px] font-bold uppercase tracking-widest">Tasks</span>
                        </button>
                        <!-- Inactive Item: Messages -->
                        <button
                                class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-150 group">
                                <span class="material-symbols-outlined mb-1">chat_bubble</span>
                                <span class="text-[12px] font-bold uppercase tracking-widest">Messages</span>
                        </button>
                        <!-- Inactive Item: Profile -->
                        <button
                                class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-150 group">
                                <span class="material-symbols-outlined mb-1">person</span>
                                <span class="text-[12px] font-bold uppercase tracking-widest">Profile</span>
                        </button>
                </div>
        </nav>
</body>

</html>

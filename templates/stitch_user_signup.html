<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Customer Registration - LocalHelp</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-container": "#40c2fd",
                        "on-secondary-container": "#004d6a",
                        "on-primary-fixed": "#131b2e",
                        "surface-tint": "#565e74",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#76777d",
                        "on-tertiary-fixed": "#40000d",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "surface": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eceef0",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#7bd0ff",
                        "secondary": "#00668a",
                        "primary-fixed": "#dae2fd",
                        "on-background": "#191c1e",
                        "primary": "#000000",
                        "on-secondary-fixed": "#001e2c",
                        "surface-container-high": "#e6e8ea",
                        "outline-variant": "#c6c6cd",
                        "inverse-primary": "#bec6e0",
                        "surface-variant": "#e0e3e5",
                        "tertiary-container": "#40000d",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-tertiary-container": "#f23d5c",
                        "primary-fixed-dim": "#bec6e0",
                        "secondary-fixed": "#c4e7ff",
                        "on-tertiary-fixed-variant": "#92002a",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed": "#ffdadb",
                        "tertiary": "#000000",
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary-fixed-variant": "#004c69",
                        "inverse-surface": "#2d3133",
                        "on-surface-variant": "#45464d",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-secondary": "#ffffff",
                        "primary-container": "#131b2e",
                        "surface-bright": "#f7f9fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "stack-md": "24px",
                        "touch-target-min": "56px",
                        "stack-lg": "48px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "body-md": ["Inter"],
                        "action-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-bold": ["16px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "500" }],
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "action-lg": ["20px", { "lineHeight": "1.2", "letterSpacing": "0", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid var(--outline-variant);
        }

        .custom-input {
            border: none;
            border-bottom: 2px solid var(--outline);
            background-color: transparent;
            transition: border-color 0.2s ease;
        }

        .custom-input:focus {
            outline: none;
            border-bottom-color: var(--primary);
            box-shadow: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <!-- TopAppBar (Transactional - Hidden Navigation Shell elements based on Semantic Shell Mandate for Login/Signup) -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-6 h-16 bg-white/70 backdrop-blur-md shadow-sm border-b-[1.5px] border-slate-200">
        <div class="text-xl font-black text-primary tracking-tighter">LocalHelp</div>
    </header>
    <main class="flex-grow flex items-center justify-center pt-[80px] pb-10 px-margin-mobile md:px-margin-desktop">
        <div class="w-full max-w-[600px] glass-panel rounded-xl p-6 md:p-10 shadow-lg shadow-primary/5">
            <div class="text-center mb-stack-lg">
                <h1 class="font-headline-xl text-headline-xl text-primary mb-stack-sm">Create Customer Account</h1>
                <p class="font-body-lg text-body-lg text-on-surface-variant">Join LocalHelp to easily find reliable help
                    in your community.</p>
            </div>
            <form class="space-y-stack-md">
                <!-- Personal Information Section -->
                <div class="space-y-stack-sm">
                    <h2
                        class="font-headline-md text-headline-md text-on-surface border-b-[1.5px] border-outline-variant pb-2">
                        Personal Information</h2>
                    <!-- Full Name Input -->
                    <div class="relative pt-4">
                        <label class="absolute top-0 left-0 font-label-bold text-label-bold text-on-surface-variant"
                            for="fullName">Full Name</label>
                        <div class="flex items-center">
                            <input
                                class="custom-input w-full h-[48px] font-body-md text-body-md text-on-surface placeholder:text-outline"
                                id="fullName" name="fullName" placeholder="e.g. Alex Johnson" type="text" />
                            <button aria-label="Voice input for full name"
                                class="ml-2 p-2 rounded-full hover:bg-surface-variant text-primary focus:outline-none"
                                type="button">
                                <span class="material-symbols-outlined"
                                    style="font-variation-settings: 'FILL' 0;">mic</span>
                            </button>
                        </div>
                    </div>
                    <!-- Email Input -->
                    <div class="relative pt-4">
                        <label class="absolute top-0 left-0 font-label-bold text-label-bold text-on-surface-variant"
                            for="email">Email Address</label>
                        <div class="flex items-center">
                            <input
                                class="custom-input w-full h-[48px] font-body-md text-body-md text-on-surface placeholder:text-outline"
                                id="email" name="email" placeholder="e.g. alex@example.com" type="email" />
                            <button aria-label="Voice input for email"
                                class="ml-2 p-2 rounded-full hover:bg-surface-variant text-primary focus:outline-none"
                                type="button">
                                <span class="material-symbols-outlined"
                                    style="font-variation-settings: 'FILL' 0;">mic</span>
                            </button>
                        </div>
                    </div>
                    <!-- Phone Number Input -->
                    <div class="relative pt-4">
                        <label class="absolute top-0 left-0 font-label-bold text-label-bold text-on-surface-variant"
                            for="phone">Phone Number</label>
                        <div class="flex items-center">
                            <input
                                class="custom-input w-full h-[48px] font-body-md text-body-md text-on-surface placeholder:text-outline"
                                id="phone" name="phone" placeholder="e.g. (555) 123-4567" type="tel" />
                            <button aria-label="Voice input for phone number"
                                class="ml-2 p-2 rounded-full hover:bg-surface-variant text-primary focus:outline-none"
                                type="button">
                                <span class="material-symbols-outlined"
                                    style="font-variation-settings: 'FILL' 0;">mic</span>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Accessibility Preferences Section -->
                <div class="space-y-stack-sm pt-4">
                    <h2
                        class="font-headline-md text-headline-md text-on-surface border-b-[1.5px] border-outline-variant pb-2">
                        Accessibility Preferences</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-4">Select options to tailor your
                        experience.</p>
                    <div class="space-y-4">
                        <label
                            class="flex items-start space-x-4 cursor-pointer p-4 rounded-lg hover:bg-surface-variant transition-colors border-[1.5px] border-outline-variant bg-surface">
                            <div class="flex-shrink-0 h-6 flex items-center">
                                <input
                                    class="h-5 w-5 rounded border-outline text-primary focus:ring-primary focus:ring-offset-background bg-surface-container-lowest"
                                    name="screenReader" type="checkbox" />
                            </div>
                            <div class="flex flex-col">
                                <span class="font-label-bold text-label-bold text-on-surface">Screen Reader
                                    Optimized</span>
                                <span class="font-body-md text-body-md text-on-surface-variant mt-1">Enhance layout for
                                    text-to-speech tools.</span>
                            </div>
                        </label>
                        <label
                            class="flex items-start space-x-4 cursor-pointer p-4 rounded-lg hover:bg-surface-variant transition-colors border-[1.5px] border-outline-variant bg-surface">
                            <div class="flex-shrink-0 h-6 flex items-center">
                                <input
                                    class="h-5 w-5 rounded border-outline text-primary focus:ring-primary focus:ring-offset-background bg-surface-container-lowest"
                                    name="highContrast" type="checkbox" />
                            </div>
                            <div class="flex flex-col">
                                <span class="font-label-bold text-label-bold text-on-surface">High Contrast Mode</span>
                                <span class="font-body-md text-body-md text-on-surface-variant mt-1">Increase visual
                                    contrast for better readability.</span>
                            </div>
                        </label>
                    </div>
                </div>
                <!-- Submit Section -->
                <div class="pt-stack-md">
                    <button
                        class="w-full h-[56px] flex items-center justify-center bg-primary text-on-primary rounded-lg font-action-lg text-action-lg hover:bg-primary/90 transition-colors focus:outline-none focus:ring-4 focus:ring-primary/30"
                        type="submit">
                        Create Customer Account
                        <span class="material-symbols-outlined ml-2"
                            style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
                    </button>
                    <p class="text-center font-body-md text-[14px] text-on-surface-variant mt-4">
                        By creating an account, you agree to our
                        <a class="text-secondary hover:underline font-label-bold" href="#">Terms</a> and
                        <a class="text-secondary hover:underline font-label-bold" href="#">Privacy Policy</a>.
                    </p>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
